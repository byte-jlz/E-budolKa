<!DOCTYPE html>
<html lang="en">
<head>
    <title>Seller Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg bg-secondary text-white" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-primary text-center py-3">
            <h4 class="mb-0">Seller Portal</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-warning w-100 mt-3 fw-bold">Login to Dashboard</button>
            </form>
            <div class="text-center mt-3 small">
                Authorized Personnel Only. Contact Admin for access.
            </div>
        </div>
    </div>

</body>
</html>
