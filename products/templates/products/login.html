{% extends 'products/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Welcome Back</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Log In</button>
                </form>
                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
