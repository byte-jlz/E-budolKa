{% extends 'products/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Removal</h4>
            </div>
            <div class="card-body text-center py-4">
                <p class="fs-5">Are you sure you want to remove <strong>{{ product.name }}</strong>?</p>
                <p class="text-muted small">This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <a href="{% url 'seller_dashboard' %}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, Remove Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
